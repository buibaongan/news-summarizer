services:
  app:
    image: news-summarizer-backend:ci
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/news.db}
      - ENABLE_NEWSAPI=${ENABLE_NEWSAPI:-false}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - SUMMARY_MODELS=${SUMMARY_MODELS:-tfidf,textrank,bart}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - HF_HOME=${HF_HOME:-/app/models/huggingface}
      - HF_HUB_CACHE=${HF_HUB_CACHE:-/app/models/huggingface/hub}
      - TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-/app/models/huggingface/transformers}
    depends_on: []

  frontend:
    image: news-summarizer-frontend:ci
    build: ./frontend
    profiles: ["frontend"]
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-news_summarizer}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
